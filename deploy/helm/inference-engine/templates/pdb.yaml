{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "orchestra-inference-engine.fullname" . }}
  labels:
    {{- include "orchestra-inference-engine.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "orchestra-inference-engine.selectorLabels" . | nindent 6 }}
{{- end }}
