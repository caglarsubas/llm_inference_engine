apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestra-inference-engine.fullname" . }}
  labels:
    {{- include "orchestra-inference-engine.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "orchestra-inference-engine.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestra-inference-engine.fullname" . }}-headless
  labels:
    {{- include "orchestra-inference-engine.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "orchestra-inference-engine.selectorLabels" . | nindent 4 }}
