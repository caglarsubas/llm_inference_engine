name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  SYFT_VERSION: v1.48.0

jobs:
  test:
    name: lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      valkey:
        image: valkey/valkey:8.1.3-alpine@sha256:d827e7f7552cdee40cc7482dbae9da020f42bc47669af6f71182a4ef76a22773
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --extra otel --python ${{ matrix.python-version }}

      - name: Provision empty model stores
        run: |
          ollama_dir="$RUNNER_TEMP/models/ollama"
          mlx_dir="$RUNNER_TEMP/models/mlx"
          mkdir -p "$ollama_dir/manifests" "$ollama_dir/blobs" "$mlx_dir"
          echo "OLLAMA_MODELS_DIR=$ollama_dir" >> "$GITHUB_ENV"
          echo "MLX_MODELS_DIR=$mlx_dir" >> "$GITHUB_ENV"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        env:
          AUTH_ENABLED: "false"
          TEST_VALKEY_URL: redis://127.0.0.1:6379/15
        run: uv run pytest -q

  container:
    name: "container (${{ matrix.variant }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            dockerfile: Dockerfile
          - variant: ubi9
            dockerfile: Dockerfile.ubi

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: inference-engine:ci-${{ matrix.variant }}
          build-args: |
            EXTRAS=otel
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=ci
          provenance: false
          cache-from: type=gha,scope=engine-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=engine-${{ matrix.variant }}

      - name: Prove arbitrary-UID and read-only-root operation
        run: ./scripts/container_smoke.sh inference-engine:ci-${{ matrix.variant }}

      - name: Generate SBOM
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh" \
            | sh -s -- -b "$RUNNER_TEMP/bin" "${SYFT_VERSION}"
          "$RUNNER_TEMP/bin/syft" "inference-engine:ci-${{ matrix.variant }}" \
            -o "spdx-json=sbom-${{ matrix.variant }}.spdx.json" \
            -o "cyclonedx-json=sbom-${{ matrix.variant }}.cdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-inference-engine-${{ matrix.variant }}
          path: sbom-${{ matrix.variant }}.*.json
          if-no-files-found: error

  helm:
    name: standalone OpenShift model-plane chart
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Validate shell contract
        run: |
          bash -n deploy/helm/inference-engine/ci/render-production-profile.sh
          bash -n scripts/relocate_images.sh
          bash -n scripts/test_relocate_images.sh
          bash -n scripts/verify_release_contract.sh
          shellcheck deploy/helm/inference-engine/ci/render-production-profile.sh
          shellcheck scripts/relocate_images.sh
          shellcheck scripts/test_relocate_images.sh
          shellcheck scripts/verify_release_contract.sh

      - name: Verify release version contract
        run: |
          scripts/verify_release_contract.sh
          if scripts/verify_release_contract.sh v0.0.0; then
            echo "mismatched release tag was accepted" >&2
            exit 1
          fi

      - name: Verify release artifact relocation contract
        run: scripts/test_relocate_images.sh

      - name: Prove fail-closed OpenShift render
        run: |
          deploy/helm/inference-engine/ci/render-production-profile.sh \
            "$RUNNER_TEMP/orchestra-model-plane-profile.yaml"

      - name: Retain synthetic render evidence
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-model-plane-openshift-render
          path: ${{ runner.temp }}/orchestra-model-plane-profile.yaml
          if-no-files-found: error
