name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OLLAMA_MODELS_DIR: ${{ runner.temp }}/models/ollama
      MLX_MODELS_DIR: ${{ runner.temp }}/models/mlx
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --extra otel --python ${{ matrix.python-version }}

      - name: Provision empty model stores
        run: mkdir -p "$OLLAMA_MODELS_DIR/manifests" "$OLLAMA_MODELS_DIR/blobs" "$MLX_MODELS_DIR"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        env:
          AUTH_ENABLED: "false"
        run: uv run pytest -q
