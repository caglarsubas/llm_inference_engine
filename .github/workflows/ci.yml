name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --extra otel --python ${{ matrix.python-version }}

      - name: Provision empty model stores
        run: |
          ollama_dir="$RUNNER_TEMP/models/ollama"
          mlx_dir="$RUNNER_TEMP/models/mlx"
          mkdir -p "$ollama_dir/manifests" "$ollama_dir/blobs" "$mlx_dir"
          echo "OLLAMA_MODELS_DIR=$ollama_dir" >> "$GITHUB_ENV"
          echo "MLX_MODELS_DIR=$mlx_dir" >> "$GITHUB_ENV"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        env:
          AUTH_ENABLED: "false"
        run: uv run pytest -q
