global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metrics derived from engine spans by the OTel Collector.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metric_relabel_configs:
      # Keep label cardinality bounded — drop rarely-useful default labels
      # OTel adds that don't carry information for our dashboards.
      - action: labeldrop
        regex: 'telemetry_sdk_(name|language|version)'

  # Native /v1/metrics scrape from the engine itself (Prometheus-format
  # gauges for prefix-cache state, model registry size, etc.). Engine
  # service hostname inside the compose network.
  - job_name: inference-engine
    metrics_path: /v1/metrics
    static_configs:
      - targets: ['engine:8080']
