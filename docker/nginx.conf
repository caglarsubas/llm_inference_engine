worker_processes auto;
error_log  /dev/stderr warn;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;

    # ---------------------------------------------------------------
    # Dynamic backend resolution
    #
    # nginx OSS caches static `upstream server` resolutions at startup,
    # so `--scale=N` doesn't actually distribute across replicas with
    # a plain upstream block. Instead we use the resolver + variable
    # pattern: each request triggers a fresh DNS lookup, and Compose's
    # embedded DNS round-robins us across all live replica IPs.
    #
    # Documented out-of-the-box trade-off (see README): this is
    # round-robin, not header-based stickiness. Per-tenant cache
    # locality (prefix cache rounds 8/12, tool-timing store round 21,
    # embed coalescer queue round 16) is sacrificed for simplicity.
    # For real header-based stickiness on Docker Compose, swap to
    # HAProxy with ``balance hdr(Authorization)`` or Traefik with
    # session-persistence labels — both auto-discover replicas.
    #
    # 127.0.0.11 is Docker's embedded DNS resolver in every Compose
    # network. ``valid=5s`` keeps the cache short so scaling up/down
    # is reflected quickly.
    # ---------------------------------------------------------------

    resolver 127.0.0.11 valid=5s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # Streaming-friendly tuning — the SSE path (round 5/20) needs
        # buffering off and HTTP/1.1 to avoid head-of-line blocking on
        # token-by-token deltas.
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Generous timeouts because a cold model load can take 5+ seconds
        # and a long completion can run for minutes.
        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /lb_health is the LB's own probe; /v1/health proxies through.
        location = /lb_health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            # The variable assignment forces nginx to defer DNS resolution
            # to request-time instead of caching at startup, picking up a
            # different replica IP per request from Docker's DNS.
            set $upstream_engine "engine:8080";
            proxy_pass http://$upstream_engine;
        }
    }
}
