# ---------------------------------------------------------------------------
# HAProxy config — stickiness-aware load balancer for the inference engine.
#
# This is the alternative to docker/nginx.conf (round 24). The default nginx
# overlay does round-robin without tenant-sticky routing because nginx OSS
# can't combine dynamic DNS service discovery with header-based hashing in
# its upstream block. HAProxy can — that's the whole reason this overlay
# exists.
#
# What it gives you that nginx doesn't:
#
#   * ``balance hdr(Authorization)`` — same Authorization header lands on
#     the same replica every time, preserving prefix cache (rounds 8/12),
#     tool-timing correlation across turns (round 21), and the embed
#     coalescer queue (round 16) for multi-turn agent traffic.
#
#   * ``server-template`` + ``resolvers docker`` — dynamically discovers
#     replicas added by ``docker compose up --scale engine=N`` without
#     requiring per-replica static config. Scale up: HAProxy sees the new
#     IPs within a DNS TTL (5s here). Scale down: failed replicas mark
#     down via active health checks.
#
# What it doesn't change vs the nginx overlay:
#
#   * Same SSE-friendly buffering semantics (``option http-server-close``,
#     no response buffering).
#   * Same ``/lb_health`` exposed as a probe endpoint distinct from
#     proxied /v1/health.
#   * Same generous timeouts (cold model loads, long completions).
# ---------------------------------------------------------------------------

global
    log stdout format raw local0
    maxconn 4096
    # We don't need a Unix socket admin interface inside Compose.

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  redispatch
    retries 2
    # No buffering on responses — SSE token streaming requires it.
    no option http-buffer-request

    # Request flow timeouts. ``timeout client``/``server`` are deliberately
    # large because cold loads (5+ sec on llama.cpp) and long completions
    # (minutes for big-context streaming) both happen.
    timeout connect    10s
    timeout client     600s
    timeout server     600s
    timeout queue      30s
    timeout http-request 60s
    timeout tunnel     1h         # for streaming responses kept open

# ---------------------------------------------------------------------------
# Docker service discovery — Compose's embedded DNS at 127.0.0.11 returns
# multiple A records for the ``engine`` service name when scaled. HAProxy's
# resolver re-queries every ``hold valid`` window so newly-scaled replicas
# enter the pool automatically.
# ---------------------------------------------------------------------------

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries       3
    timeout resolve       5s
    timeout retry         2s
    hold valid           5s
    hold other           5s
    hold refused         5s
    hold nx              5s
    hold timeout         5s
    accepted_payload_size 8192

# ---------------------------------------------------------------------------
# LB-internal health probe (HAProxy's own status, separate from upstream).
# ---------------------------------------------------------------------------

frontend stats
    bind *:8404
    mode http
    stats enable
    stats refresh 10s
    stats uri /stats
    stats hide-version
    no log

# ---------------------------------------------------------------------------
# Inbound traffic.
# ---------------------------------------------------------------------------

frontend inference_lb
    bind *:8080
    mode http

    # /lb_health — liveness probe for whatever's monitoring HAProxy itself.
    # Distinguished from /v1/health which proxies to a healthy engine
    # replica. Returns 200 unconditionally as long as HAProxy is up.
    http-request return status 200 content-type "text/plain" string "ok\n" if { path /lb_health }

    default_backend inference_backends

backend inference_backends
    mode http
    # Header-based consistent hashing — same Authorization → same replica.
    # Anonymous traffic (no Authorization) collapses to a single hash bucket
    # so all anonymous requests land on the same replica; that's the
    # documented trade-off for the AUTH_ENABLED=false path.
    balance hdr(Authorization)
    hash-type consistent

    # Active health checks against the engine's own /v1/health. This gates
    # which replicas are eligible for load — a replica that crashes after
    # boot stops receiving traffic within ``inter`` * ``rise``.
    option httpchk GET /v1/health
    http-check expect status 200

    # Forwarding semantics for SSE. ``option http-server-close`` lets the
    # server close the connection per response (right shape for streaming);
    # ``http-reuse never`` avoids cross-request bleed-over of streaming state.
    option http-server-close
    http-reuse never

    # Standard X-Forwarded-* headers + a tag identifying the LB.
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-For   %[src]
    http-request set-header X-Forwarded-Host  %[req.hdr(Host)]
    http-request set-header X-LB              haproxy

    # Server template — HAProxy fills these slots from DNS resolution. We
    # over-provision the slot count (10) to support scale-out up to that
    # level without restart; unfilled slots stay marked DOWN (no traffic).
    # ``init-addr none`` prevents startup from blocking on DNS for replicas
    # that aren't up yet.
    server-template engine- 10 engine:8080 check inter 10s rise 2 fall 3 resolvers docker init-addr none
